<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VivaFifa2026 API Server</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: #fcfaf6;
      color: #302b25;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Glow Blobs */
    .glow-1 {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background-color: rgba(180, 83, 9, 0.08);
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
    }

    .glow-2 {
      position: absolute;
      bottom: -150px;
      right: -150px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background-color: rgba(217, 119, 6, 0.04);
      filter: blur(100px);
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      background-color: rgba(247, 243, 235, 0.75);
      border: 1px solid rgba(62, 56, 48, 0.12);
      border-radius: 24px;
      padding: 48px 32px;
      width: 90%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(62, 56, 48, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c5a01d 0%, #b92028 50%, #5489be 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #82776a;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(39, 119, 63, 0.1);
      border: 1px solid #27773f;
      color: #27773f;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #27773f;
      border-radius: 50%;
      box-shadow: 0 0 8px #27773f;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(39, 119, 63, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 8px rgba(39, 119, 63, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(39, 119, 63, 0);
      }
    }

    .message {
      font-size: 0.95rem;
      color: #82776a;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="container">
    <h1 class="logo">VivaFifa2026</h1>
    <p class="subtitle">API Services Gateway</p>
    <div class="status-badge">
      <span class="status-dot"></span>
      API Server Online
    </div>
    <p class="message">
      This is the serverless backend gateway for VivaFifa2026. Rest API calls are processed securely.
    </p>
  </div>
</body>
</html>
